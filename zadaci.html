<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C++ Zadaci — Ilija Gajić</title>
  <style>@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --crimson: #8b0000;
  --crimson-light: #c41230;
  --crimson-glow: #ff1a3a;
  --sharingan: #cc0000;
  --void: #040404;
  --deep: #0a0305;
  --surface: #110508;
  --surface2: #180810;
  --border: #2a0a12;
  --border-light: #3d1020;
  --text: #c0a8b0;
  --text-dim: #4a3040;
  --text-bright: #e8d0d8;
  --gold: #8a6040;
  --gold-light: #c09060;
  --glow-sm: 0 0 12px rgba(139,0,0,0.5);
  --glow-md: 0 0 25px rgba(139,0,0,0.6), 0 0 50px rgba(139,0,0,0.2);
  --glow-lg: 0 0 40px rgba(196,18,48,0.8), 0 0 80px rgba(139,0,0,0.4);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--void);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}

/* Sharingan ambient background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(139,0,0,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 0% 50%, rgba(80,0,20,0.05) 0%, transparent 50%),
    radial-gradient(ellipse 40% 60% at 100% 50%, rgba(80,0,20,0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Subtle tomoe pattern */
body::after {
  content: '';
  position: fixed;
  width: 600px; height: 600px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 1px solid rgba(139,0,0,0.04);
  pointer-events: none;
  z-index: 0;
  box-shadow:
    0 0 0 80px rgba(139,0,0,0.02),
    0 0 0 160px rgba(139,0,0,0.015),
    0 0 0 240px rgba(139,0,0,0.01);
}

/* ===== SIDEBAR NAV — completely different from top nav ===== */
.sidebar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 220px;
  background: rgba(4,4,4,0.98);
  border-right: 1px solid var(--border);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  padding: 0;
  backdrop-filter: blur(20px);
}

.sidebar::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 1px; height: 100%;
  background: linear-gradient(to bottom,
    transparent,
    var(--crimson) 30%,
    var(--crimson-light) 50%,
    var(--crimson) 70%,
    transparent);
  opacity: 0.4;
}

.sidebar-logo {
  padding: 35px 25px 30px;
  border-bottom: 1px solid var(--border);
}

.logo-symbol {
  font-size: 2.8rem;
  display: block;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 10px rgba(139,0,0,0.8));
  animation: sharinganSpin 8s linear infinite;
}

@keyframes sharinganSpin {
  0%   { filter: drop-shadow(0 0 8px rgba(139,0,0,0.6)); }
  50%  { filter: drop-shadow(0 0 20px rgba(204,0,0,0.9)); }
  100% { filter: drop-shadow(0 0 8px rgba(139,0,0,0.6)); }
}

.logo-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.95rem;
  color: var(--text-bright);
  letter-spacing: 2px;
  display: block;
}

.logo-sub {
  font-size: 0.65rem;
  color: var(--crimson-light);
  letter-spacing: 3px;
  text-transform: uppercase;
  display: block;
  margin-top: 3px;
}

.sidebar-nav {
  flex: 1;
  padding: 30px 0;
  list-style: none;
}

.sidebar-nav li a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 25px;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.82rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 600;
  border-left: 3px solid transparent;
  transition: all 0.3s;
  position: relative;
}

.sidebar-nav li a .nav-icon {
  font-size: 1rem;
  width: 20px;
  text-align: center;
}

.sidebar-nav li a:hover,
.sidebar-nav li a.active {
  color: var(--text-bright);
  border-left-color: var(--crimson-light);
  background: linear-gradient(to right, rgba(139,0,0,0.12), transparent);
  padding-left: 28px;
}

.sidebar-nav li a.active {
  color: var(--crimson-glow);
  text-shadow: 0 0 10px rgba(255,26,58,0.5);
}

.sidebar-bottom {
  padding: 20px 25px;
  border-top: 1px solid var(--border);
}

.sidebar-quote {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.7rem;
  color: var(--text-dim);
  font-style: italic;
  line-height: 1.6;
  text-align: center;
}

/* ===== MAIN CONTENT — offset by sidebar ===== */
.main {
  margin-left: 220px;
  position: relative;
  z-index: 1;
  min-height: 100vh;
}

/* ===== HERO — vertical split layout ===== */
.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  position: relative;
  overflow: hidden;
}

.hero-left {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 60px;
  position: relative;
  z-index: 1;
}

.hero-eyebrow {
  font-size: 0.7rem;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--crimson-light);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.hero-eyebrow::before {
  content: '';
  width: 30px;
  height: 1px;
  background: var(--crimson-light);
}

.hero-title {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(3rem, 5vw, 6rem);
  font-weight: 900;
  line-height: 1.0;
  color: var(--text-bright);
  margin-bottom: 8px;
}

.hero-title span {
  color: var(--crimson-light);
  display: block;
  text-shadow: var(--glow-md);
}

.hero-desc {
  font-size: 0.9rem;
  color: var(--text-dim);
  line-height: 1.8;
  max-width: 380px;
  margin: 25px 0 40px;
  border-left: 2px solid var(--border-light);
  padding-left: 18px;
}

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 13px 30px;
  background: transparent;
  border: 1px solid var(--crimson);
  color: var(--text-bright);
  font-size: 0.8rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.hero-cta::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--crimson);
  transform: translateX(-100%);
  transition: transform 0.3s;
  z-index: -1;
}

.hero-cta:hover { border-color: var(--crimson-light); box-shadow: var(--glow-sm); }
.hero-cta:hover::before { transform: translateX(0); }

.hero-right {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  background: var(--deep);
  border-left: 1px solid var(--border);
}

.hero-right::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(139,0,0,0.1) 0%, transparent 70%);
}

.sharingan-visual {
  position: relative;
  width: 280px;
  height: 280px;
}

.s-outer {
  width: 280px; height: 280px;
  border-radius: 50%;
  border: 2px solid rgba(139,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
  animation: s-rot1 20s linear infinite;
  position: absolute;
}

.s-mid {
  width: 200px; height: 200px;
  border-radius: 50%;
  border: 2px solid rgba(204,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  animation: s-rot1 12s linear infinite reverse;
  position: absolute;
  top: 40px; left: 40px;
}

.s-inner {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, #3a0010, #1a0008);
  border: 3px solid var(--crimson);
  display: flex; align-items: center; justify-content: center;
  position: absolute;
  top: 80px; left: 80px;
  box-shadow: 0 0 30px rgba(139,0,0,0.6), inset 0 0 20px rgba(139,0,0,0.3);
  animation: innerPulse 3s ease-in-out infinite;
}

.s-pupil {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: radial-gradient(circle, #000, #1a0008);
  border: 2px solid var(--crimson-light);
}

.s-tomoe {
  position: absolute;
  width: 18px; height: 18px;
  border-radius: 50% 0 50% 50%;
  background: var(--crimson);
  box-shadow: 0 0 8px rgba(204,0,0,0.8);
}
.s-tomoe:nth-child(1) { top: 10px; left: 50%; transform: translateX(-50%); }
.s-tomoe:nth-child(2) { bottom: 20px; left: 15px; }
.s-tomoe:nth-child(3) { bottom: 20px; right: 15px; }

.s-dots {
  position: absolute;
  inset: 0;
}
.s-dot {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(139,0,0,0.5);
}
.s-dot:nth-child(1) { top: 5px; left: 50%; transform: translateX(-50%); }
.s-dot:nth-child(2) { top: 25%; right: 5px; }
.s-dot:nth-child(3) { bottom: 25%; right: 5px; }
.s-dot:nth-child(4) { bottom: 5px; left: 50%; transform: translateX(-50%); }
.s-dot:nth-child(5) { bottom: 25%; left: 5px; }
.s-dot:nth-child(6) { top: 25%; left: 5px; }

@keyframes s-rot1 { to { transform: rotate(360deg); } }
@keyframes innerPulse {
  0%,100% { box-shadow: 0 0 20px rgba(139,0,0,0.5), inset 0 0 15px rgba(139,0,0,0.3); }
  50% { box-shadow: 0 0 50px rgba(204,0,0,0.9), inset 0 0 25px rgba(204,0,0,0.5); }
}

/* Stats row under hero title */
.hero-stats {
  display: flex;
  gap: 30px;
  margin-bottom: 30px;
}

.h-stat { text-align: center; }
.h-stat-num {
  font-family: 'Noto Serif JP', serif;
  font-size: 2rem;
  font-weight: 900;
  color: var(--crimson-light);
  display: block;
  text-shadow: var(--glow-sm);
}
.h-stat-lbl {
  font-size: 0.62rem;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ===== PAGE HERO (for inner pages) ===== */
.page-hero {
  background: var(--deep);
  border-bottom: 1px solid var(--border);
  padding: 60px 70px 50px;
  position: relative;
  overflow: hidden;
}

.page-hero::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(139,0,0,0.07) 0%, transparent 70%);
}

.page-hero-label {
  font-size: 0.65rem;
  letter-spacing: 5px;
  color: var(--crimson-light);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.page-hero-label::before {
  content: '';
  width: 20px; height: 1px;
  background: var(--crimson);
}

.page-hero h1 {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(2rem, 4vw, 3.5rem);
  font-weight: 900;
  color: var(--text-bright);
  letter-spacing: 2px;
  line-height: 1.1;
}

.page-hero h1 em {
  color: var(--crimson-light);
  font-style: normal;
  text-shadow: var(--glow-sm);
}

.page-hero-meta {
  margin-top: 12px;
  font-size: 0.78rem;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* ===== CONTENT AREA ===== */
.content {
  padding: 60px 70px;
}

/* ===== ACCORDION SECTIONS for zadaci — different from grid ===== */
.acc-section {
  margin-bottom: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: border-color 0.3s;
}

.acc-section:hover { border-color: var(--border-light); }

.acc-header {
  padding: 18px 25px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}

.acc-header:hover { background: rgba(139,0,0,0.05); }

.acc-header-left {
  display: flex;
  align-items: center;
  gap: 15px;
}

.acc-num {
  font-size: 0.65rem;
  color: var(--crimson-light);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 700;
  min-width: 90px;
}

.acc-title {
  font-size: 0.88rem;
  color: var(--text-bright);
  font-weight: 600;
  letter-spacing: 1px;
}

.acc-count {
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 1px;
}

.acc-arrow {
  color: var(--crimson);
  font-size: 0.8rem;
  transition: transform 0.3s;
}

.acc-section.open .acc-arrow { transform: rotate(180deg); }

.acc-body {
  display: none;
  padding: 5px 25px 25px;
  border-top: 1px solid var(--border);
}

.acc-section.open .acc-body { display: block; }

/* Task list inside accordion — horizontal scrollable table style */
.task-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

.task-table tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.2s;
}

.task-table tr:last-child { border-bottom: none; }
.task-table tr:hover { background: rgba(139,0,0,0.04); }

.task-table td {
  padding: 12px 15px;
  font-size: 0.82rem;
  vertical-align: middle;
}

.td-num {
  color: var(--crimson);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 0.78rem;
  width: 70px;
  letter-spacing: 1px;
}

.td-badge { width: 90px; }

.td-desc {
  color: var(--text);
  line-height: 1.4;
}

.td-actions {
  width: 160px;
  text-align: right;
}

.td-actions { display: flex; gap: 6px; justify-content: flex-end; }

.btn-sm {
  padding: 5px 12px;
  font-size: 0.7rem;
  letter-spacing: 1px;
  font-weight: 700;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
  white-space: nowrap;
}

.btn-preview {
  background: transparent;
  border: 1px solid var(--border-light);
  color: var(--text-dim);
}
.btn-preview:hover {
  border-color: var(--crimson);
  color: var(--crimson-light);
  background: rgba(139,0,0,0.1);
}

.btn-proof {
  background: var(--crimson);
  border: 1px solid var(--crimson);
  color: #fff;
}
.btn-proof:hover {
  background: var(--crimson-light);
  border-color: var(--crimson-light);
  box-shadow: var(--glow-sm);
}

/* Badges */
.badge {
  display: inline-block;
  font-size: 0.58rem;
  letter-spacing: 1px;
  padding: 2px 7px;
  border-radius: 2px;
  text-transform: uppercase;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.badge-loop    { background:rgba(100,100,200,0.15); color:#8888dd; border:1px solid rgba(100,100,200,0.3); }
.badge-struct  { background:rgba(200,50,50,0.15);   color:#dd8888; border:1px solid rgba(200,50,50,0.3); }
.badge-class   { background:rgba(180,130,20,0.15);  color:#cca050; border:1px solid rgba(180,130,20,0.3); }
.badge-function{ background:rgba(20,150,100,0.15);  color:#50c090; border:1px solid rgba(20,150,100,0.3); }
.badge-pointer { background:rgba(150,50,150,0.15);  color:#c080c0; border:1px solid rgba(150,50,150,0.3); }
.badge-inherit { background:rgba(50,150,50,0.15);   color:#80c080; border:1px solid rgba(50,150,50,0.3); }
.badge-virtual { background:rgba(20,150,180,0.15);  color:#50b0d0; border:1px solid rgba(20,150,180,0.3); }
.badge-file    { background:rgba(140,100,60,0.15);  color:#b08860; border:1px solid rgba(140,100,60,0.3); }
.badge-array   { background:rgba(80,110,140,0.15);  color:#80a0c0; border:1px solid rgba(80,110,140,0.3); }
.badge-overload{ background:rgba(160,40,120,0.15);  color:#d070b0; border:1px solid rgba(160,40,120,0.3); }

/* ===== GAMES PAGE — masonry-style cards, different layout ===== */
.games-wrapper {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
}

.game-block {
  background: var(--surface);
  padding: 40px;
  transition: background 0.3s;
  position: relative;
  overflow: hidden;
}

.game-block::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(to right, var(--crimson), var(--crimson-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s;
}

.game-block:hover { background: var(--surface2); }
.game-block:hover::before { transform: scaleX(1); }

.game-block-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--crimson);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.game-block-icon {
  font-size: 2.5rem;
  margin-bottom: 15px;
  display: block;
  filter: drop-shadow(0 0 8px rgba(139,0,0,0.4));
}

.game-block-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 10px;
  letter-spacing: 1px;
}

.game-block-desc {
  font-size: 0.8rem;
  color: var(--text-dim);
  line-height: 1.7;
  margin-bottom: 25px;
  font-family: 'JetBrains Mono', monospace;
}

.game-block-actions {
  display: flex;
  gap: 10px;
}

/* ===== FOOTER ===== */
footer {
  position: relative;
  z-index: 1;
  background: var(--void);
  border-top: 1px solid var(--border);
  padding: 25px 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.72rem;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
}

footer span { color: var(--crimson); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 5000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 30px;
}
.modal-overlay.active { display: flex; }

.modal-box {
  background: var(--deep);
  border: 1px solid var(--border-light);
  width: 100%;
  max-width: 800px;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  animation: mIn 0.25s ease;
  box-shadow: 0 0 80px rgba(139,0,0,0.3);
}

@keyframes mIn {
  from { opacity:0; transform: translateY(15px); }
  to   { opacity:1; transform: translateY(0); }
}

.modal-top {
  padding: 20px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(139,0,0,0.05);
}

.modal-top-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1rem;
  color: var(--text-bright);
  letter-spacing: 2px;
}

.modal-x {
  padding: 6px 12px;
  background: transparent;
  border: 1px solid var(--border-light);
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}
.modal-x:hover { border-color: var(--crimson); color: var(--crimson-light); background: rgba(139,0,0,0.1); }

.modal-scroll {
  overflow-y: auto;
  flex: 1;
  padding: 28px;
}

.modal-scroll pre {
  background: #020202;
  border: 1px solid var(--border);
  padding: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.83rem;
  line-height: 1.75;
  color: #c8a0a8;
  white-space: pre-wrap;
  overflow-x: auto;
}

.modal-scroll img {
  width: 100%;
  margin-top: 20px;
  border: 1px solid var(--border);
  display: block;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--void); }
::-webkit-scrollbar-thumb { background: var(--crimson); }
::-webkit-scrollbar-thumb:hover { background: var(--crimson-light); }

/* ===== RESPONSIVE ===== */
@media (max-width: 1100px) {
  .sidebar { width: 200px; }
  .main { margin-left: 200px; }
  .hero-left { padding: 60px 40px; }
  .content { padding: 50px 40px; }
  .page-hero { padding: 50px 40px 40px; }

    code:`#include <iostream>

private:
    double obim;
    double visina;
public:
    Balon(double o = 0, double v = 0) : obim(o), visina(v) {}
    
    double zapremina() {
        double radius = obim / (2 * M_PI);
        return M_PI * pow(radius, 2) * visina;
    }
    
    double getObim() { return obim; }
    double getVisina() { return visina; }
};

    for (int i = 0; i < N; i++) {
        double obim = rand() % 100 + 10;
        double visina = rand() % 100 + 10;
        baloni[i] = Balon(obim, visina);
    }
    
    double maxZapremina = baloni[0].zapremina();
    for (int i = 1; i < N; i++) {
        if (baloni[i].zapremina() > maxZapremina)
            maxZapremina = baloni[i].zapremina();
    }
    
    printf("Najveca zapremina balona je: %.2f\n", maxZapremina);

}` },

    code:`#include <stdio.h>

    }
    niz[N] = '\0';
    
    long long broj = pretvoriBroj(niz, N);
    
    printf("Formirani broj: %lld\n", broj);
    
    return 0;
}` },

  { id:36, title:"Struct Brojevi - Malloc", badge:"pointer", badgeClass:"badge-pointer",
    desc:"Struct Brojevi sa N, dinamička alokacija malloc, sabiranje",
    code:`#include <iostream>
#include <stdlib.h>
#include <time.h>
#include <math.h>

typedef struct {
    int *brojevi;
    int N;
} Brojevi;

void unesiiBrojeve(Brojevi b) {
    printf("Unesite %d brojeva:\n", b.N);
    for (int i = 0; i < b.N; i++) {
        scanf("%d", &b.brojevi[i]);
    }
}

int saberiBrojeve(Brojevi b) {
    int zbir = 0;
    for (int i = 0; i < b.N; i++) {
        zbir += b.brojevi[i];
    }
    return zbir;
}

int main() {
    int N;
    printf("Unesite broj brojeva: ");
    scanf("%d", &N);
    
    Brojevi b;
    b.N = N;
    b.brojevi = (int*)malloc(N * sizeof(int));
    
    if (b.brojevi == NULL) {
        printf("Greska pri alokaciji memorije.\n");
        return 1;
    }
    
    unesiiBrojeve(b);
    
    int zbir = saberiBrojeve(b);
    printf("Zbir unetih brojeva je: %d\n", zbir);
    
    free(b.brojevi);
    return 0;
}` },

const sections = [
  { title: "Petlje", ids: [1,2,3,4,5,6] },
  { title: "Nizovi i Strukture", ids: [7,8,9,10] },
  { title: "Funkcije i Klase", ids: [11,12,13,14,15,16] },
  { title: "Liste i Tekstualni Fajlovi", ids: [17,18] },
  { title: "Konstruktori i Static", ids: [19,20,21,22,23] },
  { title: "Set, Get i Overload", ids: [24,25,26,27,28] },
  { title: "Izuzeci i Pointeri", ids: [29,30,31,32,33,34,35,36,37] },
  { title: "Izvedene Klase i Polimorfizam", ids: [38,39,40,41,42,43,44,45] }
];

const badgeMap = {
  loop:'badge-loop', struct:'badge-struct', class:'badge-class',
  function:'badge-function', pointer:'badge-pointer', inherit:'badge-inherit',
  virtual:'badge-virtual', file:'badge-file', array:'badge-array', overload:'badge-overload'
};

function buildAccordion() {
  const acc = document.getElementById('accordion');
  sections.forEach((sec, i) => {
    const div = document.createElement('div');
    div.className = 'acc-section' + (i === 0 ? ' open' : '');
    div.innerHTML = `
      <div class="acc-header" onclick="toggleAcc(this.parentElement)">
        <div class="acc-header-left">
          <span class="acc-num">Sekcija ${String(i+1).padStart(2,'0')}</span>
          <span class="acc-title">${sec.title}</span>
        </div>
        <div style="display:flex;align-items:center;gap:15px">
          <span class="acc-count">${sec.ids.length} zadataka</span>
          <span class="acc-arrow">▼</span>
        </div>
      </div>
      <div class="acc-body">
        <table class="task-table">
          <tbody id="tbody-${i}"></tbody>
        </table>
      </div>`;
    acc.appendChild(div);
    const tbody = div.querySelector(`#tbody-${i}`);
    sec.ids.forEach(id => {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="td-num">#${String(id).padStart(2,'0')}</td>
        <td class="td-badge"><span class="badge ${badgeMap[task.badge] || 'badge-class'}">${task.badge}</span></td>
        <td class="td-desc">${task.desc}</td>
        <td class="td-actions">
          <a href="#" class="btn-sm btn-preview" onclick="openModal(${id});return false;">Prikaži</a>
          <a href="slika${id}.png" class="btn-sm btn-proof">Dokaz</a>
        </td>`;
      tbody.appendChild(tr);
    });
  });
}

function toggleAcc(el) {
  el.classList.toggle('open');
}

function openModal(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  document.getElementById('modalTitle').textContent = `#${String(id).padStart(2,'0')} — ${task.title}`;
  document.getElementById('modalBody').innerHTML = `<pre>${escapeHtml(task.code)}</pre><img src="" alt="">`;
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal')) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

buildAccordion();
</script>
